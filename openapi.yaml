openapi: 3.1.0
info:
  title: Terra Compare API
  version: 1.1.0
  summary: A2MCP property comparison service for Terra AI.
  description: >
    Terra Compare accepts 2 to 5 real estate options plus user preferences,
    then returns a structured side-by-side comparison, hidden-cost estimate,
    ranking, and final recommendation.
servers:
  - url: https://terra-ai.up.railway.app
    description: Production
  - url: http://localhost:3000
    description: Local development
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is available.
  /api/v1/compare:
    post:
      summary: Compare 2 to 5 properties
      description: >
        Generates a structured property comparison report after OKX x402
        payment verification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompareRequest"
      responses:
        "200":
          description: Comparison report generated successfully.
        "400":
          description: Invalid request payload.
        "402":
          description: Payment required. The base64-encoded x402 v2 challenge is in the PAYMENT-REQUIRED response header.
          headers:
            PAYMENT-REQUIRED:
              required: true
              schema:
                type: string
              description: Base64-encoded x402 v2 payment challenge.
  /api/v1/hidden-costs:
    post:
      summary: Estimate hidden costs for one property
      description: >
        Estimates first-year hidden costs for one supplied property, including
        closing costs, repair reserve, property tax, insurance, maintenance,
        and HOA or service fees.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SinglePropertyRequest"
      responses:
        "200":
          description: Hidden-cost estimate generated successfully.
        "400":
          description: Invalid request payload.
        "402":
          description: Payment required. The base64-encoded x402 v2 challenge is in the PAYMENT-REQUIRED response header.
          headers:
            PAYMENT-REQUIRED:
              required: true
              schema:
                type: string
              description: Base64-encoded x402 v2 payment challenge.
  /api/v1/investment-check:
    post:
      summary: Score one property for investment fit
      description: >
        Scores one property for rental or investment potential using supplied
        yield, appreciation, location, condition, hidden-cost, and preference
        signals.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SinglePropertyRequest"
      responses:
        "200":
          description: Investment check generated successfully.
        "400":
          description: Invalid request payload.
        "402":
          description: Payment required. The base64-encoded x402 v2 challenge is in the PAYMENT-REQUIRED response header.
          headers:
            PAYMENT-REQUIRED:
              required: true
              schema:
                type: string
              description: Base64-encoded x402 v2 payment challenge.
  /api/v1/buyer-fit:
    post:
      summary: Score one property against buyer preferences
      description: >
        Scores one property against a buyer's budget, must-haves,
        deal-breakers, commute, size, condition, and living-quality priorities.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SinglePropertyRequest"
      responses:
        "200":
          description: Buyer-fit check generated successfully.
        "400":
          description: Invalid request payload.
        "402":
          description: Payment required. The base64-encoded x402 v2 challenge is in the PAYMENT-REQUIRED response header.
          headers:
            PAYMENT-REQUIRED:
              required: true
              schema:
                type: string
              description: Base64-encoded x402 v2 payment challenge.
components:
  schemas:
    SinglePropertyRequest:
      type: object
      properties:
        property:
          $ref: "#/components/schemas/PropertyInput"
        userPreferences:
          $ref: "#/components/schemas/UserPreferences"
      required:
        - property
    CompareRequest:
      type: object
      required:
        - properties
      properties:
        properties:
          type: array
          minItems: 2
          maxItems: 5
          items:
            oneOf:
              - type: string
                minLength: 3
              - $ref: "#/components/schemas/PropertyInput"
        userPreferences:
          $ref: "#/components/schemas/UserPreferences"
    PropertyInput:
      type: object
      additionalProperties: true
      properties:
        name:
          type: string
        address:
          type: string
        url:
          type: string
          format: uri
        price:
          type: number
        currency:
          type: string
          example: USD
        bedrooms:
          type: number
        bathrooms:
          type: number
        sizeSqm:
          type: number
        condition:
          type: string
          enum: [new, excellent, good, fair, needs_work, fixer_upper]
        estimatedHoaMonthly:
          type: number
        annualPropertyTax:
          type: number
        schoolScore:
          type: number
          minimum: 0
          maximum: 10
        safetyScore:
          type: number
          minimum: 0
          maximum: 10
        amenityScore:
          type: number
          minimum: 0
          maximum: 10
        locationScore:
          type: number
          minimum: 0
          maximum: 10
        commuteMinutes:
          type: number
        rentalYieldPercent:
          type: number
        appreciationScore:
          type: number
        livingQualityScore:
          type: number
        investmentPotentialScore:
          type: number
        features:
          type: array
          items:
            type: string
        notes:
          type: string
    UserPreferences:
      type: object
      properties:
        budget:
          type: number
        currency:
          type: string
          example: USD
        mustHaves:
          type: array
          items:
            type: string
        dealBreakers:
          type: array
          items:
            type: string
        minBedrooms:
          type: number
        minBathrooms:
          type: number
        minSizeSqm:
          type: number
        maxCommuteMinutes:
          type: number
        purpose:
          type: string
          enum: [primary_home, rental_investment, flip, vacation_home, mixed]
        priorities:
          type: object
          properties:
            price:
              type: number
            location:
              type: number
            investmentPotential:
              type: number
            livingQuality:
              type: number
            size:
              type: number
            condition:
              type: number
            hiddenCosts:
              type: number
        outputFormat:
          type: string
          enum: [json, markdown, both]
    DataQuality:
      type: object
      properties:
        dataSource:
          type: string
          example: user_provided
        liveDataUsed:
          type: boolean
          example: false
        liveDataProviders:
          type: array
          items:
            type: string
        averageDataCoverage:
          type: number
          example: 0.8
        confidence:
          type: string
          enum: [low, medium, high]
        accuracyNotes:
          type: array
          items:
            type: string
